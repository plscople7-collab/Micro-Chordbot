<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1f2937">
  <title>μChordbot</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon-192.svg">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="runtimeWarning" class="runtime-warning hidden" role="alert" aria-live="polite">
    <div id="runtimeWarningMessage" class="runtime-warning-message"></div>
    <button id="runtimeWarningCloseBtn" type="button" class="notice-close" aria-label="close">x</button>
  </div>
  <div id="pwaPrompt" class="pwa-prompt hidden" aria-live="polite">
    <div id="pwaPromptMessage" class="pwa-prompt-message"></div>
    <div class="pwa-prompt-actions">
      <button id="pwaPromptCloseBtn" type="button" class="notice-close" aria-label="close">x</button>
      <button id="installPwaBtn" type="button" hidden>アプリを追加</button>
    </div>
  </div>

  <header class="topbar">
    <div class="brand-nav">
      <h1 class="brand-title">μChordbot</h1>
      <nav class="view-nav" aria-label="画面切替">
        <button type="button" data-view="pitch" class="active">音高</button>
        <button type="button" data-view="progression">コード進行</button>
        <button type="button" data-view="settings">設定</button>
      </nav>
    </div>
    <div class="history-buttons">
      <button id="undoBtn" type="button">元に戻す</button>
      <button id="redoBtn" type="button">やり直す</button>
      <label class="master-volume-inline" title="Master Vol.">
        <span class="master-volume-icon" aria-hidden="true">Vol</span>
        <input id="masterVolumeInput" type="range" min="0" max="1" step="0.01" value="0.3" aria-label="Master Volume">
      </label>
    </div>
  </header>

  <main>
    <section id="view-pitch" class="view active">
      <div class="pitch-toolbar">
        <div class="controls-grid pitch-controls">
          <label>オクターブ
            <input id="octaveInput" type="number" min="-2" max="9" step="1" value="4">
          </label>
          <label>スナップ cent
            <input id="snapCentInput" type="number" min="0" max="600" step="0.001" value="16.666">
          </label>
          <label>cent
            <div class="inline-row inline-row-compact">
              <button id="centDownBtn" type="button">-</button>
              <input id="centInput" type="text" inputmode="decimal" value="0">
              <button id="centUpBtn" type="button">+</button>
            </div>
          </label>
          <label class="visually-hidden">microStep
            <input id="microStepInput" type="number" readonly>
          </label>
        </div>

        <div class="controls-grid pitch-options">
          <label class="sustain-toggle" title="未チェックなら押している間のみ出音">
            <span>持続音</span>
            <input id="sustainModeInput" type="checkbox" checked>
            <span aria-hidden="true">ON</span>
          </label>
          <label>波形
            <select id="waveformSelect">
              <option value="sine">sine</option>
              <option value="square">square</option>
              <option value="sawtooth">sawtooth</option>
            </select>
          </label>
          <label>activeNotes 音量
            <input id="activeNotesVolumeInput" type="range" min="0" max="1" step="0.01" value="0.5">
          </label>
        </div>
      </div>

      <div class="line-wrap">
        <canvas id="pitchLine" width="1000" height="80" aria-label="pitch line"></canvas>
        <p id="lineReadout" class="readout">cent 0 / microStep 0</p>
      </div>

      <section class="panel unified-panel">
        <div class="panel-heading">
          <div class="panel-heading-block">
            <h3>音高ライブラリ</h3>
            <p id="activeNotesSummary" class="panel-note"></p>
          </div>
          <div class="panel-heading-actions">
            <p id="pitchPresetStatus" class="status-text" aria-live="polite"></p>
            <button id="clearActiveNotesBtn" type="button">一括削除</button>
          </div>
        </div>
        <div class="library-stack">
          <section class="library-block">
            <div class="library-block-head">
              <strong>activeNotes</strong>
              <input id="activeNotesFilterInput" type="text" class="table-filter-input" placeholder="名前 / ID / タグで絞り込み">
            </div>
            <div id="activeNotesList" class="preset-list scroll-list"></div>
          </section>
          <section class="library-block">
            <div class="library-block-head">
              <strong>音高プリセット</strong>
              <span class="panel-note">クリックで追加、ダブルクリックで編集</span>
            </div>
            <input id="pitchPresetFilterInput" type="text" class="table-filter-input" placeholder="名前 / ID / タグで絞り込み">
            <div class="visually-hidden">
              <input id="pitchPresetIdInput" type="text">
              <input id="pitchPresetNameInput" type="text">
              <input id="pitchPresetShortNameInput" type="text">
              <input id="pitchPresetTagsInput" type="text">
              <textarea id="pitchPresetMemoInput" rows="2"></textarea>
              <button id="savePitchPresetBtn" type="button">音高プリセットを保存</button>
            </div>
            <div id="pitchPresetList" class="preset-list scroll-list"></div>
          </section>
        </div>
      </section>

      <section class="panel unified-panel">
        <div class="panel-heading">
          <div class="panel-heading-block">
            <h3>コードライブラリ</h3>
            <p id="recallChordSummary" class="panel-note"></p>
          </div>
          <div class="panel-heading-actions">
            <p id="chordStatus" class="status-text" aria-live="polite"></p>
            <p id="recallChordStatus" class="status-text" aria-live="polite"></p>
          </div>
        </div>
        <div class="library-controls-grid visually-hidden">
          <label>コードID
            <input id="chordIdInput" type="text" placeholder="CHORD_MAJ">
          </label>
          <label>コード名
            <input id="chordNameInput" type="text" placeholder="Maj">
          </label>
          <label>タグ
            <input id="chordTagsInput" type="text" placeholder="bright, core">
          </label>
          <label>各音ラベル
            <input id="chordLabelsInput" type="text" placeholder="Root, M3, P5">
          </label>
          <label>基音
            <input id="recallRootTextInput" type="text" inputmode="text" placeholder="D#3">
          </label>
          <label>基音プリセット
            <select id="recallRootPresetSelect"></select>
          </label>
          <label>一覧フィルタ
            <input id="chordTagFilterInput" type="text" placeholder="tag: core / bright / min">
          </label>
          <label>メモ
            <textarea id="chordMemoInput" rows="2" placeholder="メモ"></textarea>
          </label>
        </div>
        <div class="visually-hidden">
          <select id="chordBaseRootSelect"></select>
          <select id="recallChordSelect"></select>
          <select id="recallRootModeSelect">
            <option value="preset" selected>preset</option>
          </select>
          <input id="recallRootOctaveInput" type="number" value="4">
          <button id="loadChordBtn" type="button">activeNotes に展開</button>
        </div>
        <div class="inline-row library-actions visually-hidden">
          <button id="saveChordBtn" type="button">activeNotes から保存</button>
        </div>
        <div id="chordPresetList" class="preset-list scroll-list"></div>
      </section>
    </section>

    <section id="view-progression" class="view">
      <div class="progression-toolbar">
        <button id="progPrevBtn" type="button" aria-label="前のセル">前へ</button>
        <div id="progCounter" class="progression-counter">00/00</div>
        <button id="progNextBtn" type="button" aria-label="次のセル">次へ</button>
        <button id="playProgBtn" type="button">再生</button>
        <button id="stopProgBtn" type="button">停止</button>
        <button id="progMenuToggleBtn" class="progression-menu-toggle" type="button" aria-expanded="false" aria-controls="progToolbarActions">メニュー</button>
        <div id="progToolbarActions" class="progression-toolbar-actions">
          <label class="inline-check">
            <input id="progLoopInput" type="checkbox">
            <span>ループ</span>
          </label>
          <label class="progression-columns">列数
            <select id="progColumnsSelect">
              <option value="2">2</option>
              <option value="4" selected>4</option>
              <option value="8">8</option>
            </select>
          </label>
        </div>
      </div>

      <div id="progressionGrid" class="progression-grid"></div>

      <section id="progressionEditor" class="progression-editor">
        <div class="progression-editor-header">
          <div class="progression-editor-heading">
            <h3>進行エディタ</h3>
            <p id="progSummary" class="panel-note"></p>
          </div>
          <div class="progression-editor-header-actions">
            <button id="progEditorToggleBtn" class="progression-editor-toggle" type="button" aria-expanded="true" aria-controls="progressionEditorBody">編集</button>
            <div class="progression-actions">
              <button id="addProgPartBtn" type="button">挿入</button>
              <button id="deleteProgPartBtn" type="button">削除</button>
            </div>
          </div>
        </div>

        <div id="progressionEditorBody" class="progression-editor-body">
          <div class="progression-root-row">
            <label class="progression-root-inline">
              <span>ルート</span>
              <span class="progression-root-combo">
                <input id="progRootNoteInput" type="text" inputmode="text" placeholder="D#" aria-label="root note">
                <input id="progRootOctaveInput" type="number" min="-2" max="9" step="1" value="4" aria-label="octave">
              </span>
            </label>
            <div class="quick-row">
              <button id="progFlatBtn" type="button">b</button>
              <button id="progNaturalBtn" type="button">♮</button>
              <button id="progSharpBtn" type="button">#</button>
            </div>
            <div id="progOctaveButtons" class="quick-grid octave-grid visually-hidden">
              <button type="button" data-octave="2">2</button>
              <button type="button" data-octave="3">3</button>
              <button type="button" data-octave="4">4</button>
              <button type="button" data-octave="5">5</button>
            </div>
          </div>

          <div id="progRootLetterButtons" class="quick-grid root-grid">
            <button type="button" data-note="C">C</button>
            <button type="button" data-note="D">D</button>
            <button type="button" data-note="E">E</button>
            <button type="button" data-note="F">F</button>
            <button type="button" data-note="G">G</button>
            <button type="button" data-note="A">A</button>
            <button type="button" data-note="B">B</button>
          </div>

          <label>コード一覧フィルタ
            <input id="progChordTagFilterInput" type="text" placeholder="tag: core / min / sus">
          </label>
          <div id="progChordButtonGrid" class="quick-grid chord-grid"></div>

          <div class="panel-heading">
            <h4>拍</h4>
            <p class="panel-note">拍以外は変更時にプレビュー発音します。</p>
          </div>
          <div id="progBeatsButtonGrid" class="quick-grid beats-grid">
            <button type="button" data-beats="4">4/4</button>
            <button type="button" data-beats="8">8/4</button>
            <button type="button" data-beats="12">12/4</button>
            <button type="button" data-beats="16">16/4</button>
          </div>
          <p id="progStatus" class="status-text" aria-live="polite"></p>
        </div>
      </section>
    </section>

    <section id="view-settings" class="view">
      <div class="panel">
        <div class="panel-heading">
          <h3>Runtime / PWA</h3>
        </div>
        <p id="runtimeInfoText" class="readout"></p>
      </div>
      <div class="panel">
        <div class="panel-heading">
          <h3>一覧幅</h3>
        </div>
        <div class="controls-grid compact-grid">
          <label>名前列 rem
            <input id="presetNameWidthInput" type="number" min="8" max="30" step="1" value="14">
          </label>
          <label>cent 列 rem
            <input id="presetCentWidthInput" type="number" min="4" max="14" step="1" value="7">
          </label>
          <label>短名列 rem
            <input id="presetShortWidthInput" type="number" min="4" max="16" step="1" value="7">
          </label>
          <label>タグ列 rem
            <input id="presetTagWidthInput" type="number" min="6" max="24" step="1" value="10">
          </label>
          <label>メモ列 rem
            <input id="presetMemoWidthInput" type="number" min="8" max="28" step="1" value="12">
          </label>
          <label>コード箱 px
            <input id="progressionCellWidthInput" type="number" min="140" max="320" step="4" value="192">
          </label>
        </div>
      </div>
      <div class="panel">
        <div class="controls-grid compact-grid">
          <label>A4 Hz
            <input id="a4HzInput" type="number" min="400" max="500" step="0.01" value="440">
          </label>
          <label>BPM
            <input id="bpmInput" type="number" min="5" max="300" step="1" value="130">
          </label>
          <label>丸め単位 cent
            <input id="roundUnitInput" type="number" min="0" max="600" step="0.001" value="0">
          </label>
          <label>丸めモード
            <select id="roundingModeSelect">
              <option value="beforeRoot">beforeRoot</option>
              <option value="afterRoot">afterRoot</option>
            </select>
          </label>
        </div>
        <p class="readout">丸め単位を 0 にすると丸め無効です。</p>
      </div>
      <div class="panel">
        <div class="panel-heading">
          <h3>入出力</h3>
        </div>
        <div class="inline-row">
          <button id="exportBtn" type="button">project.mcb を書き出し</button>
          <button id="exportLibraryBtn" type="button">library.mcbl を書き出し</button>
          <label class="file-pick">
            <span>読み込み</span>
            <input id="importFileInput" type="file" accept=".mcb,.mcbl,.json,application/json,text/plain,application/octet-stream,*/*">
          </label>
        </div>
        <p id="manageStatus" class="status-text" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <script type="module" src="./src/app.js"></script>
</body>
</html>

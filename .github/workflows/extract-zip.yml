name: Extract uploaded zip

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: "Path to zip file in repository"
        required: true
        default: "uploads/muchordbot_v0.2.zip"

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract zip
        run: |
          rm -rf .extract_tmp
          mkdir .extract_tmp
          unzip "${{ inputs.zip_path }}" -d .extract_tmp
          top_dir="$(find .extract_tmp -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          cp -R "$top_dir"/. .
          rm -rf .extract_tmp
          rm -f "${{ inputs.zip_path }}"

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Extract uploaded zip contents"
          git push
